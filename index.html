<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Icon Mask Snap</title>
    <link rel="icon" href="image_93.png">
    <link rel="apple-touch-icon" href="image_93.png">

    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --mask-color-empty: rgba(255, 255, 255, 0.9);
            --mask-color-active: rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: calc(env(safe-area-inset-top, 20px) + 10px) 20px env(safe-area-inset-bottom, 20px);
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; flex-grow: 1; }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            width: 100%;
        }

        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; margin: 0; }

        .hub-link {
            text-decoration: none; font-size: 0.8rem; font-weight: 800; color: var(--main);
            background: var(--accent); padding: 8px 14px; border-radius: 10px;
        }

        .preview-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--input-bg);
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
            border: 2px solid var(--accent);
            cursor: pointer;
            touch-action: none;
            margin-bottom: 20px;
        }

        #imagePreview {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center center;
            display: none;
            will-change: transform;
        }

        .mask-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
            background: radial-gradient(circle, transparent 48%, var(--mask-color-empty) 48.5%);
        }
        .preview-wrapper.has-image .mask-overlay {
            background: radial-gradient(circle, transparent 48%, var(--mask-color-active) 48.5%);
        }

        #placeholderText {
            position: absolute; width: 100%; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #bbb;
            font-weight: 800; font-size: 0.9rem; pointer-events: none;
        }

        .controls-card {
            background: var(--input-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }

        .control-label {
            display: block; font-size: 0.7rem; font-weight: 900;
            color: #999; text-transform: uppercase; margin-bottom: 10px;
        }

        .zoom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        #resetBtn {
            background: var(--accent); border: none; padding: 4px 10px;
            border-radius: 8px; font-size: 0.65rem; font-weight: 800;
            cursor: pointer; color: var(--main); display: none;
        }

        input[type="range"] {
            width: 100%; height: 6px; background: var(--accent);
            border-radius: 5px; outline: none; -webkit-appearance: none; margin-bottom: 20px;
        }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: var(--main); border-radius: 50%; cursor: pointer; }

        .sns-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; }
        .sns-btn {
            background: #fff; border: 2px solid var(--accent); padding: 12px;
            border-radius: 12px; font-size: 0.75rem; font-weight: 800;
            cursor: pointer; color: var(--main); -webkit-appearance: none;
        }
        .sns-btn.active { background: var(--main); color: #fff; border-color: var(--main); -webkit-text-fill-color: #fff; }

        .main-btn {
            -webkit-appearance: none; width: 100%; padding: 18px;
            background: var(--main); color: #fff; border: none;
            border-radius: var(--radius); font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: transform 0.1s; margin-bottom: 10px;
            -webkit-text-fill-color: #fff; opacity: 1 !important;
        }
        .main-btn:active { transform: scale(0.98); }
        .sub-btn { background: #fff; color: var(--main); border: 2px solid var(--main); -webkit-text-fill-color: var(--main); }

        .footer-btns { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: auto; padding: 20px 0; }
        .kofi-btn, .home-btn {
            display: flex; align-items: center; justify-content: center; width: 100%; max-width: 320px;
            padding: 14px; border-radius: var(--radius); font-weight: 800; font-size: 0.85rem;
            text-decoration: none; border: none; cursor: pointer; -webkit-appearance: none;
        }
        .kofi-btn { background: var(--main); color: #fff; -webkit-text-fill-color: #fff; }
        .home-btn { background: var(--accent); color: var(--main); -webkit-text-fill-color: var(--main); }

        footer { text-align: center; font-size: 0.7rem; color: #bbb; line-height: 1.6; padding-bottom: 10px; font-weight: 600; }
        footer a { color: inherit; text-decoration: underline; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #fff; width: 85%; max-width: 340px; padding: 30px; border-radius: var(--radius); position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #888; cursor: pointer; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Icon Mask Snap</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <input type="file" id="fileInput" accept="image/*">

    <div class="preview-wrapper" id="dropZone" onclick="triggerUpload()">
        <img id="imagePreview" src="">
        <div id="maskOverlay" class="mask-overlay"></div>
        <p id="placeholderText">Tap to Select Photo</p>
    </div>

    <div class="controls-card">
        <div class="zoom-header">
            <span class="control-label">Zoom Control</span>
            <button id="resetBtn" onclick="resetView()">Reset</button>
        </div>
        <input type="range" id="zoomScale" min="0.5" max="3" step="0.01" value="1">

        <span class="control-label">Mask Type</span>
        <div class="sns-selector">
            <button class="sns-btn active" onclick="setMask('circle', this)">Circle</button>
            <button class="sns-btn" onclick="setMask('x', this)">X / Twitter</button>
            <button class="sns-btn" onclick="setMask('ig', this)">Instagram</button>
            <button class="sns-btn" onclick="setMask('yt', this)">YouTube</button>
        </div>

        <button id="downloadBtn" class="main-btn" style="display:none;" onclick="downloadCropped()">DOWNLOAD PNG</button>
        <button id="changeBtn" class="main-btn sub-btn" style="display:none;" onclick="triggerUpload()">Change Photo</button>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a><br>
        afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin:0 0 15px 0; font-weight:900;">📱 Install</h3>
        <p style="font-size:0.9rem; margin-bottom:15px; font-weight:600;">Add to your home screen.</p>
        <p style="font-size:0.8rem; color:#666; line-height:1.5;">🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen</p>
        <p style="font-size:0.8rem; color:#666; line-height:1.5; margin-top:10px;">🤖 <strong>Android:</strong><br>Menu > Add to Home Screen</p>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const placeholderText = document.getElementById('placeholderText');
    const zoomScale = document.getElementById('zoomScale');
    const dropZone = document.getElementById('dropZone');
    const maskOverlay = document.getElementById('maskOverlay');
    const changeBtn = document.getElementById('changeBtn');
    const resetBtn = document.getElementById('resetBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let scale = 1, baseScale = 1, dragX = 0, dragY = 0;
    let isDragging = false, startX, startY, originalImg = null;

    function triggerUpload() { fileInput.click(); }

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadImage(file);
    });

    function loadImage(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                originalImg = img;
                const containerSize = dropZone.offsetWidth;
                scale = 1; zoomScale.value = 1; dragX = 0; dragY = 0;
                baseScale = Math.max(containerSize / img.width, containerSize / img.height);
                imagePreview.src = img.src;
                imagePreview.style.display = 'block';
                placeholderText.style.display = 'none';
                changeBtn.style.display = 'block';
                resetBtn.style.display = 'block';
                downloadBtn.style.display = 'block';
                dropZone.classList.add('has-image');
                updateTransform();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function resetView() { scale = 1; zoomScale.value = 1; dragX = 0; dragY = 0; updateTransform(); }

    dropZone.addEventListener('mousedown', startDrag);
    dropZone.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('mousemove', drag);
    window.addEventListener('touchmove', drag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        if (!imagePreview.src) return;
        isDragging = true;
        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        startX = clientX - dragX; startY = clientY - dragY;
    }

    function drag(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault();
        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        dragX = clientX - startX; dragY = clientY - startY;
        requestAnimationFrame(updateTransform);
    }

    function endDrag() { isDragging = false; }

    zoomScale.addEventListener('input', (e) => { scale = parseFloat(e.target.value); updateTransform(); });

    function updateTransform() {
        const currentScale = baseScale * scale;
        imagePreview.style.transform = `translate(-50%, -50%) translate(${dragX}px, ${dragY}px) scale(${currentScale})`;
    }

    function setMask(type, btn) {
        document.querySelectorAll('.sns-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let r = "48%"; 
        if (type === 'x') r = "46.5%";
        if (type === 'ig') r = "47.5%";
        if (type === 'yt') r = "45.5%";
        const col = imagePreview.src ? 'var(--mask-color-active)' : 'var(--mask-color-empty)';
        maskOverlay.style.background = `radial-gradient(circle, transparent ${r}, ${col} ${r})`;
    }

    function downloadCropped() {
        if (!originalImg) return;
        const canvas = document.createElement('canvas');
        const size = 1024;
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        const wrapperSize = dropZone.offsetWidth;
        const currentScale = baseScale * scale;
        const drawW = originalImg.width * currentScale * (size / wrapperSize);
        const drawH = originalImg.height * currentScale * (size / wrapperSize);
        const centerX = size / 2 + (dragX * (size / wrapperSize));
        const centerY = size / 2 + (dragY * (size / wrapperSize));
        ctx.drawImage(originalImg, centerX - drawW / 2, centerY - drawH / 2, drawW, drawH);
        const link = document.createElement('a');
        link.download = `icon-${Date.now()}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch(e) {}
    }
    window.onload = loadFooter;
</script>
</body>
</html>
